<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Skills – SkillSwap</title>
  <meta name="description" content="Discover and connect with skilled individuals on SkillSwap. Search and filter by skills to find your ideal exchange partner." />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .browse-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .filter-bar {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xl);
      padding: 20px 24px;
      margin-bottom: 28px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      background: var(--bg-card-3);
      border: 1px solid var(--border-light);
      color: var(--text-secondary);
    }

    .filter-chip:hover,
    .filter-chip.active {
      background: rgba(108,99,255,0.15);
      border-color: rgba(108,99,255,0.35);
      color: var(--primary-light);
    }

    .browse-user-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: var(--transition);
      cursor: pointer;
      position: relative;
    }

    .browse-user-card:hover {
      border-color: var(--primary);
      transform: translateY(-6px);
      box-shadow: var(--shadow-glow);
    }

    .browse-user-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: var(--transition);
    }

    .browse-user-card:hover::before { opacity: 1; }

    .card-top {
      padding: 24px 24px 0;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .card-avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      font-weight: 700;
      flex-shrink: 0;
      overflow: hidden;
      border: 2px solid var(--border);
    }

    .card-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .card-location {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .card-bio {
      font-size: 0.82rem;
      color: var(--text-secondary);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.5;
    }

    .card-skills-section {
      padding: 16px 24px;
    }

    .card-skills-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .card-footer {
      padding: 16px 24px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border-light);
      gap: 12px;
    }

    .card-rating {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.8rem;
    }

    .card-rating .stars { color: var(--warning); }

    .results-info {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    /* User Detail Modal */
    .user-modal-content {
      max-width: 600px;
    }

    .user-modal-header-banner {
      background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(255,101,132,0.1));
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .user-modal-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      font-weight: 700;
      flex-shrink: 0;
      overflow: hidden;
      border: 3px solid var(--border);
    }

    .user-modal-avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* Sort/Filter row */
    .sort-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sort-select {
      background: var(--bg-card-3);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 0.85rem;
      padding: 8px 12px;
      outline: none;
      cursor: pointer;
      font-family: var(--font-sans);
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div id="toast-container"></div>
  <div id="main-navbar"></div>

  <div class="page-wrapper">
    <div class="container">
      <!-- Header -->
      <div class="browse-header">
        <div>
          <h1 class="section-title" style="font-size:1.8rem">Discover Skill Partners 🌍</h1>
          <p class="section-subtitle">Find people who can teach what you want to learn — and learn from what you teach</p>
        </div>
        <div class="sort-row">
          <span style="font-size:0.85rem;color:var(--text-secondary)">Sort by:</span>
          <select class="sort-select" id="sort-select">
            <option value="match">Best Match</option>
            <option value="name">Name A–Z</option>
            <option value="rating">Highest Rated</option>
            <option value="recent">Recently Joined</option>
          </select>
        </div>
      </div>

      <!-- Search & Filter Bar -->
      <div class="filter-bar animate-fade-up">
        <div class="search-wrapper" style="flex:1;min-width:240px">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" class="form-control search-input" placeholder="Search by name or skill..." />
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap" id="filter-chips">
          <button class="filter-chip active" data-filter="all">All Users</button>
          <button class="filter-chip" data-filter="match">Best Matches</button>
          <button class="filter-chip" data-filter="offer">Has Skills to Teach</button>
          <button class="filter-chip" data-filter="want">Wants to Learn</button>
        </div>
      </div>

      <!-- Results Info -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <span class="results-info" id="results-count">Loading users...</span>
        <div id="active-filters" style="display:flex;gap:6px"></div>
      </div>

      <!-- User Grid -->
      <div class="grid-3" id="users-grid">
        <!-- Skeleton loaders -->
        ${Array(6).fill(0).map(() => `
          <div class="browse-user-card" style="pointer-events:none">
            <div class="card-top">
              <div style="width:56px;height:56px;border-radius:50%;background:var(--bg-card-3);animation:shimmer 1.5s infinite"></div>
              <div style="flex:1">
                <div style="height:14px;width:60%;background:var(--bg-card-3);border-radius:4px;margin-bottom:8px;animation:shimmer 1.5s infinite"></div>
                <div style="height:10px;width:40%;background:var(--bg-card-3);border-radius:4px;animation:shimmer 1.5s infinite"></div>
              </div>
            </div>
            <div class="card-skills-section">
              <div style="height:10px;width:80%;background:var(--bg-card-3);border-radius:4px;margin-bottom:8px;animation:shimmer 1.5s infinite"></div>
              <div style="height:10px;width:60%;background:var(--bg-card-3);border-radius:4px;animation:shimmer 1.5s infinite"></div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  </div>

  <!-- User Detail Modal -->
  <div class="modal-overlay hidden" id="user-detail-modal">
    <div class="modal user-modal-content">
      <div class="modal-header">
        <h3 id="modal-user-title">User Profile</h3>
        <button class="modal-close" id="close-user-modal">✕</button>
      </div>

      <!-- User banner -->
      <div class="user-modal-header-banner">
        <div class="user-modal-avatar" id="modal-avatar">?</div>
        <div style="flex:1">
          <div style="font-size:1.2rem;font-weight:700;margin-bottom:4px" id="modal-name">–</div>
          <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:8px" id="modal-location">–</div>
          <div id="modal-rating-display" style="display:flex;gap:2px;align-items:center"></div>
        </div>
        <div>
          <span class="match-score" id="modal-match-score" style="display:none">🎯 –</span>
        </div>
      </div>

      <!-- Bio -->
      <p id="modal-bio" style="color:var(--text-secondary);font-size:0.875rem;margin-bottom:20px;line-height:1.7"></p>

      <!-- Skills -->
      <div style="margin-bottom:20px">
        <div style="font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:8px">🎁 Skills Offered</div>
        <div class="tags-list" id="modal-offer-tags"></div>
      </div>

      <div style="margin-bottom:24px">
        <div style="font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:8px">🎯 Skills Wanted</div>
        <div class="tags-list" id="modal-want-tags"></div>
      </div>

      <!-- Actions -->
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <button class="btn btn-primary" id="modal-send-request-btn" style="flex:1">
          📨 Send Exchange Request
        </button>
        <button class="btn btn-secondary" id="modal-chat-btn">
          💬 Message
        </button>
      </div>
    </div>
  </div>

  <!-- Send Request Modal -->
  <div class="modal-overlay hidden" id="send-request-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>📨 Send Skill Request</h3>
        <button class="modal-close" id="close-send-modal">✕</button>
      </div>
      <p style="color:var(--text-secondary);font-size:0.875rem;margin-bottom:20px" id="send-modal-subtitle">Propose a skill exchange</p>
      <div class="form-group">
        <label class="form-label">Skill I'll Teach</label>
        <select id="send-offer-skill" class="form-control">
          <option value="">Select from your offered skills</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Skill I Want to Learn</label>
        <select id="send-want-skill" class="form-control">
          <option value="">Select from their offered skills</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Personal Message (Optional)</label>
        <textarea id="send-message" class="form-control" placeholder="Introduce yourself and explain why you'd be a great exchange partner..."></textarea>
      </div>
      <div style="display:flex;gap:12px">
        <button class="btn btn-secondary" id="cancel-send-modal">Cancel</button>
        <button class="btn btn-primary" id="confirm-send-request" style="flex:1">🚀 Send Request</button>
      </div>
    </div>
  </div>

  <style>
    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="utils.js"></script>
  <script>
    let currentUser = null;
    let myProfile = null;
    let allUsers = [];
    let filteredUsers = [];
    let selectedUser = null;
    let currentFilter = 'all';
    let currentSort = 'match';
    let searchQuery = '';

    requireAuth(async (user) => {
      currentUser = user;
      await renderNavbar('browse');
      await loadMyProfile();
      await loadUsers();
      checkURLParams();
    });

    async function loadMyProfile() {
      const snap = await db.collection('users').doc(currentUser.uid).get();
      myProfile = snap.data() || {};
    }

    async function loadUsers() {
      try {
        const snap = await db.collection('users').get();
        allUsers = snap.docs
          .map(d => ({ uid: d.id, ...d.data() }))
          .filter(u => u.uid !== currentUser.uid);

        applyFiltersAndSort();
      } catch (err) {
        showToast('Error loading users: ' + err.message, 'error');
      }
    }

    function applyFiltersAndSort() {
      let result = [...allUsers];

      // Search filter
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        result = result.filter(u => {
          const name = (u.displayName || '').toLowerCase();
          const offered = (u.skillsOffered || []).join(' ').toLowerCase();
          const wanted = (u.skillsWanted || []).join(' ').toLowerCase();
          const bio = (u.bio || '').toLowerCase();
          return name.includes(q) || offered.includes(q) || wanted.includes(q) || bio.includes(q);
        });
      }

      // Category filter
      if (currentFilter === 'match') {
        result = result.filter(u => {
          const score = computeMatchScore(
            myProfile.skillsOffered || [], myProfile.skillsWanted || [],
            u.skillsOffered || [], u.skillsWanted || []
          );
          return score > 0;
        });
      } else if (currentFilter === 'offer') {
        result = result.filter(u => (u.skillsOffered || []).length > 0);
      } else if (currentFilter === 'want') {
        result = result.filter(u => (u.skillsWanted || []).length > 0);
      }

      // Add match scores
      result = result.map(u => ({
        ...u,
        matchScore: computeMatchScore(
          myProfile.skillsOffered || [], myProfile.skillsWanted || [],
          u.skillsOffered || [], u.skillsWanted || []
        )
      }));

      // Sort
      if (currentSort === 'match') {
        result.sort((a, b) => b.matchScore - a.matchScore);
      } else if (currentSort === 'name') {
        result.sort((a, b) => (a.displayName || '').localeCompare(b.displayName || ''));
      } else if (currentSort === 'rating') {
        result.sort((a, b) => (b.rating || 0) - (a.rating || 0));
      } else if (currentSort === 'recent') {
        result.sort((a, b) => {
          const aTime = a.createdAt?.toDate()?.getTime() || 0;
          const bTime = b.createdAt?.toDate()?.getTime() || 0;
          return bTime - aTime;
        });
      }

      filteredUsers = result;
      renderUsers();
    }

    function renderUsers() {
      const grid = document.getElementById('users-grid');
      const count = document.getElementById('results-count');
      count.textContent = `${filteredUsers.length} user${filteredUsers.length !== 1 ? 's' : ''} found`;

      if (!filteredUsers.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <span class="empty-icon">🔭</span>
            <h3>No users found</h3>
            <p>Try adjusting your search or filters. Invite friends to join!</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = filteredUsers.map(u => {
        const offered = u.skillsOffered || [];
        const wanted = u.skillsWanted || [];
        const rating = u.rating || 0;
        const ratingCount = u.ratingCount || 0;
        const initials = getInitials(u.displayName || '?');

        return `
          <div class="browse-user-card animate-fade-up" onclick="openUserDetail('${u.uid}')">
            <div class="card-top">
              <div class="card-avatar">
                ${u.photoURL ? `<img src="${u.photoURL}" alt="${u.displayName}">` : initials}
              </div>
              <div class="card-info">
                <div class="card-name">${u.displayName || 'Anonymous'}</div>
                ${u.location ? `<div class="card-location">📍 ${u.location}</div>` : ''}
                <div class="card-bio">${u.bio || 'No bio yet.'}</div>
              </div>
              ${u.matchScore > 0 ? `<span class="match-score" style="align-self:flex-start">🎯 ${u.matchScore}%</span>` : ''}
            </div>

            <div class="card-skills-section">
              ${offered.length ? `
                <div class="card-skills-label">🎁 Teaching</div>
                <div class="tags-list">
                  ${offered.slice(0,4).map(s => `<span class="skill-tag skill-tag-offer">${s}</span>`).join('')}
                  ${offered.length > 4 ? `<span style="font-size:0.75rem;color:var(--text-muted)">+${offered.length-4} more</span>` : ''}
                </div>
              ` : ''}
              ${wanted.length ? `
                <div class="card-skills-label" style="margin-top:12px">🎯 Learning</div>
                <div class="tags-list">
                  ${wanted.slice(0,3).map(s => `<span class="skill-tag skill-tag-want">${s}</span>`).join('')}
                  ${wanted.length > 3 ? `<span style="font-size:0.75rem;color:var(--text-muted)">+${wanted.length-3} more</span>` : ''}
                </div>
              ` : ''}
            </div>

            <div class="card-footer">
              <div class="card-rating">
                <span class="stars">★★★★★</span>
                <span style="color:var(--text-muted);font-size:0.78rem">
                  ${rating > 0 ? `${rating.toFixed(1)} (${ratingCount})` : 'Not rated'}
                </span>
              </div>
              <div style="display:flex;gap:8px">
                <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();openSendRequest('${u.uid}')">📨</button>
                <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();openUserDetail('${u.uid}')">View →</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Search
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', debounce(() => {
      searchQuery = searchInput.value.trim();
      applyFiltersAndSort();
    }, 300));

    // Filter chips
    document.getElementById('filter-chips').addEventListener('click', (e) => {
      const chip = e.target.closest('[data-filter]');
      if (!chip) return;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentFilter = chip.dataset.filter;
      applyFiltersAndSort();
    });

    // Sort
    document.getElementById('sort-select').addEventListener('change', (e) => {
      currentSort = e.target.value;
      applyFiltersAndSort();
    });

    // Open User Detail Modal
    async function openUserDetail(uid) {
      selectedUser = filteredUsers.find(u => u.uid === uid);
      if (!selectedUser) return;

      const modal = document.getElementById('user-detail-modal');
      const u = selectedUser;

      document.getElementById('modal-user-title').textContent = u.displayName || 'User Profile';
      document.getElementById('modal-name').textContent = u.displayName || 'Anonymous';
      document.getElementById('modal-location').textContent = u.location || 'Location not set';
      document.getElementById('modal-bio').textContent = u.bio || 'This user has not added a bio yet.';

      const avatarEl = document.getElementById('modal-avatar');
      avatarEl.innerHTML = u.photoURL ? `<img src="${u.photoURL}" alt="${u.displayName}">` : getInitials(u.displayName || '?');

      // Rating
      const rating = u.rating || 0;
      document.getElementById('modal-rating-display').innerHTML =
        Array.from({length:5}, (_, i) => `<span style="color:${i < Math.round(rating) ? 'var(--warning)' : 'var(--text-muted)'}">★</span>`).join('') +
        (rating > 0 ? `<span style="font-size:0.8rem;color:var(--text-muted);margin-left:6px">${rating.toFixed(1)}</span>` : '');

      // Match score
      const matchScoreEl = document.getElementById('modal-match-score');
      if (u.matchScore > 0) {
        matchScoreEl.style.display = 'inline-flex';
        matchScoreEl.textContent = `🎯 ${u.matchScore}% Match`;
      } else {
        matchScoreEl.style.display = 'none';
      }

      // Skills
      document.getElementById('modal-offer-tags').innerHTML = (u.skillsOffered || []).length
        ? (u.skillsOffered || []).map(s => `<span class="skill-tag skill-tag-offer">${s}</span>`).join('')
        : '<span style="color:var(--text-muted);font-size:0.8rem">None listed</span>';

      document.getElementById('modal-want-tags').innerHTML = (u.skillsWanted || []).length
        ? (u.skillsWanted || []).map(s => `<span class="skill-tag skill-tag-want">${s}</span>`).join('')
        : '<span style="color:var(--text-muted);font-size:0.8rem">None listed</span>';

      modal.classList.remove('hidden');
    }

    document.getElementById('close-user-modal').addEventListener('click', () => {
      document.getElementById('user-detail-modal').classList.add('hidden');
    });

    document.getElementById('modal-send-request-btn').addEventListener('click', () => {
      document.getElementById('user-detail-modal').classList.add('hidden');
      if (selectedUser) openSendRequest(selectedUser.uid);
    });

    document.getElementById('modal-chat-btn').addEventListener('click', () => {
      if (selectedUser) window.location.href = `chat.html?with=${selectedUser.uid}`;
    });

    // Open Send Request Modal
    async function openSendRequest(uid) {
      selectedUser = filteredUsers.find(u => u.uid === uid) || allUsers.find(u => u.uid === uid);
      if (!selectedUser) {
        // Fetch from Firestore if not in list
        const snap = await db.collection('users').doc(uid).get();
        if (!snap.exists) return;
        selectedUser = { uid, ...snap.data(), matchScore: 0 };
      }

      const offerSelect = document.getElementById('send-offer-skill');
      const wantSelect = document.getElementById('send-want-skill');

      offerSelect.innerHTML = '<option value="">-- My skill to teach --</option>' +
        (myProfile.skillsOffered || []).map(s => `<option value="${s}">${s}</option>`).join('');

      wantSelect.innerHTML = '<option value="">-- Their skill I want --</option>' +
        (selectedUser.skillsOffered || []).map(s => `<option value="${s}">${s}</option>`).join('');

      document.getElementById('send-modal-subtitle').textContent =
        `Exchange skills with ${selectedUser.displayName || 'this user'}`;

      document.getElementById('send-request-modal').classList.remove('hidden');
    }

    document.getElementById('close-send-modal').addEventListener('click', () => {
      document.getElementById('send-request-modal').classList.add('hidden');
    });

    document.getElementById('cancel-send-modal').addEventListener('click', () => {
      document.getElementById('send-request-modal').classList.add('hidden');
    });

    document.getElementById('confirm-send-request').addEventListener('click', async () => {
      const offerSkill = document.getElementById('send-offer-skill').value;
      const wantSkill = document.getElementById('send-want-skill').value;
      const message = document.getElementById('send-message').value.trim();

      if (!offerSkill) {
        showToast('Please select a skill you can offer.', 'warning');
        return;
      }
      if (!wantSkill) {
        showToast('Please select a skill you want to learn.', 'warning');
        return;
      }

      const btn = document.getElementById('confirm-send-request');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        // Check for duplicate request
        const existing = await db.collection('requests')
          .where('fromUid', '==', currentUser.uid)
          .where('toUid', '==', selectedUser.uid)
          .where('status', '==', 'pending')
          .get();

        if (!existing.empty) {
          showToast('You already have a pending request to this user.', 'warning');
          return;
        }

        await db.collection('requests').add({
          fromUid: currentUser.uid,
          fromName: myProfile.displayName || currentUser.email,
          fromPhoto: myProfile.photoURL || '',
          toUid: selectedUser.uid,
          toName: selectedUser.displayName || selectedUser.email,
          toPhoto: selectedUser.photoURL || '',
          skillOffered: offerSkill,
          skillWanted: wantSkill,
          message,
          status: 'pending',
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        document.getElementById('send-request-modal').classList.add('hidden');
        document.getElementById('send-message').value = '';
        showToast(`Request sent to ${selectedUser.displayName}! 🚀`, 'success');
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '🚀 Send Request';
      }
    });

    // URL Params (for deep-linking to a user)
    function checkURLParams() {
      const params = new URLSearchParams(window.location.search);
      const userId = params.get('user');
      if (userId) {
        const user = allUsers.find(u => u.uid === userId);
        if (user) openUserDetail(userId);
      }
    }

    // Click outside modal to close
    document.getElementById('user-detail-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('user-detail-modal')) {
        document.getElementById('user-detail-modal').classList.add('hidden');
      }
    });
    document.getElementById('send-request-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('send-request-modal')) {
        document.getElementById('send-request-modal').classList.add('hidden');
      }
    });
  </script>
</body>
</html>
